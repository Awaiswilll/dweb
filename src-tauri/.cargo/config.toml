# Windows cross-compilation (GNU toolchain)
# Install LLVM MinGW: winget install MartinStorsjo.LLVM-MinGW.UCRT
# Then uncomment and adjust the paths below for your system.
#
# [target.x86_64-pc-windows-gnu]
# linker = "clang"
# rustflags = ["-C", "link-args=-L/usr/x86_64-w64-mingw32/lib"]
#
# To build for Windows from Linux, run:
#   cargo build --target x86_64-pc-windows-gnu
#
# For native Linux builds (default), no target override is needed.
# For macOS builds, no special config is required.
